- name: Copy templates
  ansible.builtin.import_tasks: copy-templates.yml
  vars:
    directory: ../templates
    target: "{{ dns_update_root }}"
    should_notify: Restart dns-update service

- name: Install systemd units
  ansible.builtin.import_tasks: systemd-install-units.yml
  vars:
    directory: "{{ dns_update_root }}/systemd"
    local_units: templates/systemd
    should_notify: Restart dns-update service

- name: Start systemd units
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
    daemon_reload: true
  loop: "{{ systemd_units_autostart }}"
  register: dns_update_started
