- name: Install fail2ban
  ansible.builtin.package:
    name: fail2ban
  notify: Restart fail2ban

- name: Setup Ban List on Cloudflare
  delegate_to: localhost
  become: false
  community.general.terraform:
    project_path: 'roles/fail2ban/cloudflare-banlist'
    state: present
    variables:
      cloudflare_account_id: "{{ cloudflare_account_id }}"
      cloudflare_token: "{{ cloudflare_token }}"
      cloudflare_zone_id: "{{ cloudflare_zone_id }}"
  register: fail2ban_terraform

- name: Copy templates
  ansible.builtin.import_tasks: copy-templates.yml
  vars:
    directory: ../templates
    target: "{{ fail2ban_root }}"
    should_notify: Restart fail2ban

- name: Start and enable fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true
