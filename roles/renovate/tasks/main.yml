- name: Setup Cloudflare tunnel
  delegate_to: localhost
  become: false
  community.general.terraform:
    project_path: 'roles/renovate/cloudflare-tunnel'
    state: present
    variables:
      cloudflare_email: "{{ cloudflare_email }}"
      cloudflare_account_id: "{{ cloudflare_account_id  }}"
      cloudflare_token: "{{ cloudflare_token }}"
      cloudflare_zone_id: "{{ cloudflare_zone_id }}"
      domain: "{{ renovate_domain }}"
  register: terraform

- name: Copy templates
  ansible.builtin.import_tasks: copy-templates.yml
  vars:
    directory: ../templates
    target: "{{ renovate_root }}"
    should_notify: Restart renovate service

- name: Update docker-compose images
  ansible.builtin.import_tasks: docker-compose-update.yml
  vars:
    directory: "{{ renovate_root }}"
    pull: true
    build: true
    should_notify: Restart renovate service

- name: Symlink systemd unit file
  ansible.builtin.file:
    state: link
    src: "{{ renovate_root }}/systemd/renovate.service"
    path: /etc/systemd/system/renovate.service
    force: true
  notify: Restart renovate service

- name: Start service
  ansible.builtin.systemd:
    name: renovate.service
    state: started
    enabled: true
    daemon_reload: true
  register: renovate_started

- name: Ensure service domain is registered on router
  ansible.builtin.import_tasks:
    file: router-update-dns.yml
  vars:
    machine_ip: "{{ ansible_facts.default_ipv4.address }}"
    service_url: "{{ renovate_domain }}"


- name: Set up observability
  ansible.builtin.import_tasks:
    file: setup-observability.yml
  vars:
    directory: "{{ renovate_root }}"
